name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
            
            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Run Tests
              run: pytest tests/ -v

            - name: Build Docker Image
              run: docker build -t cloud-expense-tracker:${{ github.sha }} .

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
            - name: Push Docker Image
              run: |
                docker tag cloud-expense-tracker:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cloud-expense-tracker:latest
                docker push ${{ secrets.DOCKER_USERNAME }}/cloud-expense-tracker:latest