<!DOCTYPE html>
<html>
<head>
    <title>Cloud Expense Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        form { margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 8px; font-size: 14px; }
        button { padding: 10px; background: #2563eb; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Cloud Expense Tracker</h1>

    <form id="expense-form">
        <input type="text" id="title" placeholder="Title" required>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <input type="text" id="category" placeholder="Category" required>
        <input type="date" id="date" required>
        <button type="submit">Add Expense</button>
    </form>

    <table>
        <thead>
            <tr><th>Title</th><th>Amount</th><th>Category</th><th>Date</th></tr>
        </thead>
        <tbody id="expense-list"></tbody>
    </table>

    <script>
        async function loadExpenses() {
            const res = await fetch('/expenses');
            const data = await res.json();
            const list = document.getElementById('expense-list');
            list.innerHTML = '';
            data.forEach(exp => {
                list.innerHTML += `<tr><td>${exp.title}</td><td>$${exp.amount}</td><td>${exp.category}</td><td>${exp.date}</td></tr>`;
            });
        }

        document.getElementById('expense-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                title: document.getElementById('title').value,
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                date: document.getElementById('date').value
            };
            await fetch('/expenses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            e.target.reset();
            loadExpenses();
        });

        loadExpenses();
    </script>
</body>
</html>
